# MPL Release: re-runs every CI gate then publishes to crates.io in dep order,
# then opens a GitHub Release with auto-generated notes.
#
# Trigger: pushing a `vX.Y.Z` tag (e.g. `git tag v0.2.0 && git push --tags`).
# Required secrets: CARGO_REGISTRY_TOKEN (crates.io token).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Publish to crates.io + GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for action-gh-release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # ---- 1. re-verify every CI gate before any side-effects ----
      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (-D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: tests
        run: cargo test --workspace --all-features

      - name: security audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit

      # ---- 2. publish in dependency order ----
      - name: Publish mpl-protocol (root)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mpl-protocol

      - name: Wait for crates.io index propagation
        run: sleep 45

      - name: Publish mpl-proxy
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mpl-proxy

      - name: Publish mplx
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mplx

      - name: Publish mpl-registry-api
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mpl-registry-api

      - name: Publish mpl-python
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mpl-python

      # ---- 3. GitHub Release with auto-notes ----
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
